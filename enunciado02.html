<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto con Botón 3D</title>
    <link rel="stylesheet" href="/style02.css">
</head>
<body>

    <div class="principal">
        <h2>Contacto</h2>
        <form action="mailto:correo@ejemplo.com" method="post">
            <div class="grupo">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Nombre completo" required>
            </div>

            <div class="grupo">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@email.com" required>
            </div>

            <div class="grupo">
                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" name="mensaje" placeholder="Danos tu mensaje" required></textarea>
            </div>

            <button type="submit" class="btn-enviar">Enviar</button>
        </form>
    </div>

</body>
</html>
